<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bai4</title>
</head>
<style>
  table {
            width: 80%;
            max-width: 900px;
            margin: 0 auto;
            border-collapse: separate; 
            border-spacing: 2px; 
            border: 2px solid #808080;
        }
        th, td {
            border: 1px solid #808080;
            padding: 8px 12px;
            text-align: center;
            font-size: 16px;
        }
        th {
            background-color: #d3d3d3;
            color: #000000;
            font-weight: bold;
        }
        .pass{
            background-color: yellow;
        }
        .cut{

            background-color: red;
            color: white;
        }
        .monhoc{
            background-color: #d3d3d3;
        }
</style>
<body>
    <table>
        <h1 style="text-align: center;font-weight: bold;">KẾT QUẢ HỌC TẬP</h1>
        <tr>
            <th rowspan="2" style="width: 25%;">Họ tên</th>
            <th colspan="3">Môn học</th>
            <th rowspan="2" style="width: 15%;">Kết quả</th>
        </tr>
        <tr>
            <td class="monhoc">Toán</td>
            <td class="monhoc">Văn</td>
            <td class="monhoc">Ngoại ngữ</td>
        </tr>
        <tr>
            <td style="text-align: left;">Trần Văn Thành</td>
            <td>8</td>
            <td>5</td>
            <td>7</td>
            <td class="pass">Đạt</td>
        </tr>        <tr>
            <td style="text-align: left;">Lê Thanh Sơn</td>
            <td>4</td>
            <td>9</td>
            <td>6</td>
            <td class="cut"> Ko Đạt</td>
        </tr>        <tr>
            <td style="text-align: left;">Nguyễn Thị Tuyết</td>
            <td>8</td>
            <td>9</td>
            <td>5</td>
            <td class="pass">Đạt</td>
        </tr>
        <tr>
            <td colspan="4" style="text-align: left;" >Tổng số học sinh đạt</td>
            <td>2</td>   
        </tr>
    </table>
</body>
</html>
