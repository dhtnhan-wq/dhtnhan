<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bài 3</title>
    <style>
        *{
            font-family: Arial, Helvetica, sans-serif;
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        .container{
            display: flex;
        }
        .sidebar{
            background:linear-gradient(to bottom, rgb(114, 114, 214),rgb(63, 228, 228));
            color: white;
            width: 250px;
            padding: 20px;
        }
        .sidebar h2{
            margin-bottom: 20px;
        }
        .sidebar ul{
            padding-left:0px ;
            list-style: none;
        }
        .sidebar ul li{
            padding-top: 15px;
            cursor: pointer;
        }
        .sidebar ul li:hover{
            color: lightpink;
        }
        .main{
            flex: 1;
            padding:30px;
            background-color: rgb(233, 232, 231);
        }

        .main h1{
            margin-bottom: 5px;
        }
        .cards{
            display: flex;
            gap: 20px;
            margin-bottom: 30px;
            margin-top: 5px;
            
        }
        .card{
            flex: 1;
            border-radius: 6px;
            box-shadow: 0 1px 3px rgba(0, 0, 0, 3);
            height: 100px;
            text-align:left;
            align-content: center;
            padding: 20px;
            margin: 15px;
            background-color: white;
        }
        .card h3{
            margin-bottom: 10px;
            font-size: 20px;
        }
        .card p{
            font-size: 18px;
        }
    </style>
</head>
<body>
    <div class="container">
    <div class="sidebar">
        <h2>Admin</h2>
        <ul>
         <li>Dashboard</li>
        <li>Người dùng</li>
        <li>Báo cáo</li>
        <li>Cài đặt</li>
        </ul>
    </div>
    <div class="main">
        <h1>Tổng quan hệ thống</h1>
        <div class="cards">
            <div class="card">
            <h3>Người dùng</h3>
            <p>1.230</p>
            </div>
        <div class="card">
            <h3>Đơn hàng</h3>
            <p>860</p>
        </div>
        <div class="card">
            <h3>Lượt truy cập</h3>
            <p>15.400</p>
        </div>
    </div>
    <div class="tablelist">
        <h2>Danh sách người dùng</h2>
        <table>
            <thead>
            <tr>
                <th>ID</th>
                <th>Tên</th>
                <th>Email</th>
                <th>Trạng thái</th>
            </tr>
            </thead>
            <tbody>
            <tr>
                <td>1</td>
                <td>Nguyễn Văn A</td>
                <td>a@example.com</td>
                <td>Hoạt động</td>
            </tr>
            <tr>
                <td>2</td>
                <td>Trần Thị B</td>
                <td>b@example.com</td>
                <td>Tạm khóa</td>
            </tr>
            <tr>
                <td>3</td>
                <td>Lê Văn C</td>
                <td>c@example.com</td>
                <td>Hoạt động</td>
            </tr>
            </tbody>
        </table>
    </div>
    </div>
</body>
</html>
